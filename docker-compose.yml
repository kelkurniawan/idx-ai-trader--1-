version: '3.8'

services:
  # ─── Infrastructure ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: sahamgue-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sahamgue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sahamgue-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ─── Application Services ────────────────────────────────────
  python_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.python
    container_name: sahamgue-python
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  node_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.node
    container_name: sahamgue-node
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend_gateway:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sahamgue-frontend
    depends_on:
      - python_backend
      - node_backend
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
