# A generic, single database configuration.

[alembic]
# Path to migration scripts — relative to alembic.ini location
script_location = alembic

# Template for new revision files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Sys path is inserted if not already present
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

# Max length of string in slugified revision name
truncate_slug_length = 40

# Version locations — single location for this project
version_locations = %(here)s/alembic/versions

# Version path separator; use os.pathsep.
version_path_separator = os

# The output encoding used when revision files are written from script.mako
output_encoding = utf-8

# Do NOT set sqlalchemy.url here — it is set dynamically in alembic/env.py
# from the DATABASE_URL environment variable via settings.
sqlalchemy.url =


[post_write_hooks]
# No post-write hooks configured.


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
